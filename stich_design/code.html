<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Evaluación Vocacional Gamificada</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec6d",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102218",
                        "surface-dark": "#162e21", // Slightly lighter than background-dark for cards
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "1.5rem", "xl": "2rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto shadow-2xl overflow-hidden">
<!-- Header / Top Bar -->
<header class="flex items-center justify-between p-4 pt-6 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur sticky top-0 z-10">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-slate-200 dark:hover:bg-surface-dark transition-colors group">
<span class="material-symbols-outlined text-slate-800 dark:text-white group-hover:text-primary transition-colors">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight text-center flex-1">Evaluación Vocacional</h1>
<button class="flex items-center justify-center px-3 py-1 rounded-full text-sm font-bold text-slate-600 dark:text-primary hover:bg-primary/10 transition-colors">
                Salir
            </button>
</header>
<!-- Progress Section -->
<div class="px-6 py-2 flex flex-col gap-2">
<div class="flex justify-between items-end">
<span class="text-sm font-medium text-slate-500 dark:text-slate-400">Progreso</span>
<span class="text-primary font-bold">3 / 10</span>
</div>
<div class="h-3 w-full bg-slate-200 dark:bg-surface-dark rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 30%;"></div>
</div>
</div>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-4 py-4 pb-24">
<!-- Question Scenario -->
<div class="mb-6 animate-fade-in-up">
<h2 class="text-2xl font-bold leading-snug mb-3 text-slate-900 dark:text-white">
                    Imagina que trabajas en un proyecto de agroindustria en Warnes...
                </h2>
<p class="text-base text-slate-600 dark:text-slate-300 leading-relaxed">
                    Hay mucho por hacer para sacar la producción adelante. ¿Qué rol te gustaría desempeñar naturalmente en este equipo?
                </p>
</div>
<!-- Options Grid -->
<div class="grid grid-cols-2 gap-4 flex-1">
<!-- Option 1 -->
<button class="group relative flex flex-col items-center justify-center gap-3 p-4 rounded-xl bg-white dark:bg-surface-dark border-2 border-transparent hover:border-primary active:scale-95 transition-all shadow-sm hover:shadow-md h-full min-h-[160px]">
<div class="w-14 h-14 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-600 dark:text-blue-400 group-hover:bg-primary group-hover:text-background-dark transition-colors">
<span class="material-symbols-outlined text-3xl">local_shipping</span>
</div>
<div class="text-center">
<p class="font-bold text-sm text-slate-800 dark:text-white mb-1">Organizar la logística</p>
<p class="text-xs text-slate-500 dark:text-slate-400 group-hover:text-slate-600 dark:group-hover:text-slate-300">Coordinar transporte</p>
</div>
<div class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary text-xl">check_circle</span>
</div>
</button>
<!-- Option 2 -->
<button class="group relative flex flex-col items-center justify-center gap-3 p-4 rounded-xl bg-white dark:bg-surface-dark border-2 border-transparent hover:border-primary active:scale-95 transition-all shadow-sm hover:shadow-md h-full min-h-[160px]">
<div class="w-14 h-14 rounded-full bg-orange-100 dark:bg-orange-900/30 flex items-center justify-center text-orange-600 dark:text-orange-400 group-hover:bg-primary group-hover:text-background-dark transition-colors">
<span class="material-symbols-outlined text-3xl">precision_manufacturing</span>
</div>
<div class="text-center">
<p class="font-bold text-sm text-slate-800 dark:text-white mb-1">Mejorar la maquinaria</p>
<p class="text-xs text-slate-500 dark:text-slate-400 group-hover:text-slate-600 dark:group-hover:text-slate-300">Reparar equipos</p>
</div>
<div class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary text-xl">check_circle</span>
</div>
</button>
<!-- Option 3 -->
<button class="group relative flex flex-col items-center justify-center gap-3 p-4 rounded-xl bg-white dark:bg-surface-dark border-2 border-transparent hover:border-primary active:scale-95 transition-all shadow-sm hover:shadow-md h-full min-h-[160px]">
<div class="w-14 h-14 rounded-full bg-purple-100 dark:bg-purple-900/30 flex items-center justify-center text-purple-600 dark:text-purple-400 group-hover:bg-primary group-hover:text-background-dark transition-colors">
<span class="material-symbols-outlined text-3xl">brush</span>
</div>
<div class="text-center">
<p class="font-bold text-sm text-slate-800 dark:text-white mb-1">Diseñar el empaque</p>
<p class="text-xs text-slate-500 dark:text-slate-400 group-hover:text-slate-600 dark:group-hover:text-slate-300">Creatividad visual</p>
</div>
<div class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary text-xl">check_circle</span>
</div>
</button>
<!-- Option 4 -->
<button class="group relative flex flex-col items-center justify-center gap-3 p-4 rounded-xl bg-white dark:bg-surface-dark border-2 border-transparent hover:border-primary active:scale-95 transition-all shadow-sm hover:shadow-md h-full min-h-[160px]">
<div class="w-14 h-14 rounded-full bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center text-emerald-600 dark:text-emerald-400 group-hover:bg-primary group-hover:text-background-dark transition-colors">
<span class="material-symbols-outlined text-3xl">storefront</span>
</div>
<div class="text-center">
<p class="font-bold text-sm text-slate-800 dark:text-white mb-1">Vender el producto</p>
<p class="text-xs text-slate-500 dark:text-slate-400 group-hover:text-slate-600 dark:group-hover:text-slate-300">Trato con clientes</p>
</div>
<div class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary text-xl">check_circle</span>
</div>
</button>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md border-t border-slate-200 dark:border-surface-dark max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold text-lg py-4 px-6 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-transform active:scale-95">
                Siguiente Pregunta
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</body></html>
